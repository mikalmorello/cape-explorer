schema: spec-driven

context: |
  ## What this is
  Cape Explorer: a web app for mapping and documenting Cape Cod activities
  (things done and things wanted to do), for personal use and for sharing
  with others. Map-first browsing with a filterable list view alongside it.
  This is a 2-person personal project, not a commercial product.

  ## Stack (decided)
  - Frontend: React + Vite, JavaScript (no TypeScript)
  - Map: MapLibre GL (via react-map-gl) with self-hosted, committed data
    - shoreline-clipped town boundary GeoJSON (US Census cartographic
    boundary series) and inland water GeoJSON (OSM natural=water,
    intersected against the town-land union so it can't extend past
    the coastline), each regenerated on demand by its own manual
    workflow. No map API keys.
  - Backend/DB/Auth/Storage: none - fully static, no backend, no user
    accounts. Data lives in src/data/locations.json, committed to the repo.
  - Photos: no Photos API/backend - a build-time script scrapes cover
    images from Google Photos shared-album pages (see photo-gallery spec)
  - Styling: plain CSS (src/App.css), no framework
  - Hosting: GitHub Pages, deployed via a GitHub Actions workflow on push
    to main
  - Repo: https://github.com/mikalmorello/cape-explorer

  ## Core data model (current)
  See openspec/specs/location-data/spec.md for the authoritative shape.
  Summary: locations.json holds one array of locations (id, name, type,
  lat, lng, optional area/address/dogFriendly/website/photoAlbum/
  coverPhotoLink/notes, and an activities array of title/category/notes).
  No user_id, no status field - this is a list of things done, not a
  todo list, and there are no per-user accounts.

  ## Feature plan
  Built: interactive Cape Cod map with pins, List view (grouped by region,
  filterable by town), Photos view (cover grid + drill-down), town filter
  shared across Map/List, build-time photo cover harvesting.
  Later / not yet started: see "Future design references" below for
  inspiration once we get to a broader design pass.

  ## Non-goals (for now)
  - Native mobile app
  - Multi-tenant SaaS / billing / user accounts
  - Real-time collaborative editing
  - Any backend or paid API surface at all (the map is fully self-hosted)

  ## Future design references
  Not actionable yet - just inspiration to revisit whenever we do a
  broader design pass on the map/browsing experience:
  - https://www.town.shimane-misato.lg.jp/misatoto/ - interactive map
    layout, animation, and interaction style worth drawing from.
  - Google Maps API "More than a Map" gallery page (a mosaic of photos
    that leads into finding/exploring places by image) - relevant to a
    possible "find places by photo" browsing mode alongside Map/List/Photos.
  - https://www.illustrationx.com/styles/maps - illustrated/stylized map
    art direction reference, for whenever custom map styling or pin
    icons get designed.

  ## Conventions
  - New features start as an OpenSpec change with a proposal before code is
    written; archive the change once implemented.
  - Keep specs and proposals lightweight and pragmatic given the small scope
    of this project - avoid enterprise-y ceremony.

rules:
  proposal:
    - Keep proposals concise; this is a 2-person personal project, not an
      enterprise system.
  design:
    - Only document decisions that are actually undecided or non-obvious;
      don't restate the whole stack.
  tasks:
    - Group tasks by logical step (scaffold, styling, map, data model,
      deploy) rather than by file.
